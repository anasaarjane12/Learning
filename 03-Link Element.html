<link rel="stylesheet" href="./styles.css" />

<!-- 
  <link>
  connects HTML with external files

  rel="stylesheet"
  tells browser:
  "this file is a CSS stylesheet"

  href="./styles.css"
  tells browser where CSS file is

  ./
  means current folder

  styles.css
  is the CSS file name

  EXAMPLE FOLDER:

  project-folder/
  ├── index.html
  └── styles.css
-->



<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examples of the link element</title>

  <link rel="stylesheet" href="./styles.css" />
</head>

<!-- 
  <link>
  should be placed inside <head>

  Used to connect external CSS
-->



<link rel="preconnect" href="https://fonts.googleapis.com" />

<!-- 
  rel="preconnect"
  creates early connection
  to external resource

  Helps resources load faster
-->



<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<!-- 
  crossorigin
  used for external resources
  from another server
-->



<link
  href="https://fonts.googleapis.com/css2?family=Playwrite+CU:wght@100..400&display=swap"
  rel="stylesheet"
/>

<!-- 
  Links Google Font

  rel="stylesheet"
  means font stylesheet

  Google Fonts provides this code
-->



<link rel="icon" href="favicon.ico" />

<!-- 
  rel="icon"
  links favicon

  favicon =
  small icon in browser tab

  EXAMPLE:
  YouTube red icon in browser tab
-->
