<!DOCTYPE html>
<!-- tells browser this file uses HTML5 -->

<html lang="en">
<!-- lang="en" = page language is English -->

<head>

  <meta charset="utf-8">
  <!-- supports many languages/symbols -->

  <title>CatPhotoApp</title>
  <!-- text shown in browser tab -->

</head>

<body>

  <main>
  <!-- main webpage content -->

    <h1>CatPhotoApp</h1>
    <!-- main heading/title -->



    <section>
    <!-- groups related content -->

      <h2>Cat Photos</h2>

      <p>
        Everyone loves

        <a href="https://cdn.freecodecamp.org/curriculum/cat-photo-app/running-cats.jpg">
          cute cats
        </a>

        online!
      </p>

      <!-- 
        <a> = hyperlink

        href = destination URL
      -->



      <p>
        See more

        <a target="_blank" href="https://freecatphotoapp.com">
          cat photos
        </a>

        in our gallery.
      </p>

      <!-- 
        target="_blank"

        opens link in new tab
      -->



      <a href="https://freecatphotoapp.com">

        <img
          src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/relaxing-cat.jpg"

          alt="A cute orange cat lying on its back."
        >

      </a>

      <!-- 
        src = image location

        alt = alternative text

        image is clickable
        because img is inside <a>
      -->

    </section>



    <section>

      <h2>Cat Lists</h2>

      <h3>Things cats love:</h3>

      <ul>

        <li>catnip</li>
        <li>laser pointers</li>
        <li>lasagna</li>

      </ul>

      <!-- 
        <ul> = unordered list

        <li> = list item
      -->



      <figure>

        <img
          src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/lasagna.jpg"

          alt="A slice of lasagna on a plate."
        >

        <figcaption>
          Cats <em>love</em> lasagna.
        </figcaption>

      </figure>

      <!-- 
        <figure>
        groups image + caption

        <figcaption>
        image description

        <em>
        italic/emphasized text
      -->



      <h3>Top 3 things cats hate:</h3>

      <ol>

        <li>flea treatment</li>
        <li>thunder</li>
        <li>other cats</li>

      </ol>

      <!-- 
        <ol> = ordered/numbered list
      -->



      <figure>

        <img
          src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg"

          alt="Two tabby kittens sleeping together on a couch."
        >

        <figcaption>
          Cats <strong>hate</strong> other cats.
        </figcaption>

      </figure>

      <!-- 
        <strong>
        bold/important text
      -->

    </section>

  </main>



  <footer>

    <p>
      No Copyright -

      <a href="https://www.freecodecamp.org">
        freeCodeCamp.org
      </a>
    </p>

  </footer>

  <!-- 
    <footer>
    bottom section of webpage
  -->

</body>
</html>
