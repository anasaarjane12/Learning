<!DOCTYPE html>

<!--
  tells browser:
  this document uses HTML5
-->

<html lang="en">

<!--
  tells browser:
  webpage language is English
-->

<head>

  <meta charset="utf-8">

  <!--
    tells browser:
    use UTF-8 character encoding
  -->

  <title>Video Compilation Page</title>

  <!--
    tells browser:
    show this text in browser tab
  -->

</head>

<body>

  <!--
    body contains all visible page content
  -->

  <main>

    <!--
      main

      tells browser:
      this is the primary content
      of the page

      freeCodeCamp requires:
      main must be the only child
      of body
    -->

    <h1>TOPIC OF PAGE</h1>

    <!--
      h1

      tells browser:
      main topic of webpage
    -->

    <p>Introduction to Page</p>

    <!--
      introductory paragraph

      required by project
    -->

    <section>

      <!--
        section

        groups related content
      -->

      <h2>Title 1</h2>

      <!--
        section heading
      -->

      <p>Description Title 1</p>

      <!--
        description of video
      -->

      <iframe
        src="https://www.youtube.com/embed/nZpRmK2-riQ"
        title="title to describe the embedded content"
        height="250"
        width="240">
      </iframe>

      <!--
        iframe

        means:
        Inline Frame

        tells browser:
        display another webpage
        inside this webpage
      -->

      <!--
        src

        tells browser:
        which content to load
      -->

      <!--
        title

        describes iframe content

        important for accessibility
      -->

      <!--
        height

        iframe height in pixels
      -->

      <!--
        width

        iframe width in pixels
      -->

    </section>

    <!-- Section 2 -->

    <section>
      <h2>Title 2</h2>
      <p>Description Title 2</p>

      <iframe
        src="https://www.youtube.com/embed/nZpRmK2-riQ"
        title="title to describe the embedded content"
        height="250"
        width="240">
      </iframe>
    </section>

    <!-- Section 3 -->

    <section>
      <h2>Title 3</h2>
      <p>Description Title 3</p>

      <iframe
        src="https://www.youtube.com/embed/nZpRmK2-riQ"
        title="title to describe the embedded content"
        height="250"
        width="240">
      </iframe>
    </section>

  </main>

</body>

</html>
