<!DOCTYPE html>
<!-- Tells the browser this is an HTML5 document -->

<html lang="en">
<!-- Root element of the page -->

<!-- lang="en" tells browsers and screen readers the page is in English -->

<head>
<!-- Contains information about the page, not visible content -->

<meta charset="UTF-8" />
<!-- Allows the page to display most languages and special characters -->

<title>Hotel Feedback Form</title>
<!-- Text shown in the browser tab -->
</head>

<body>
<!-- Contains everything visible on the page -->

<header>
<!-- Introductory section of the page -->

<h1>Hotel Feedback Form</h1>
<!-- Main heading of the page -->

<p>
  Thank you for staying with us. Please provide feedback on your recent stay.
</p>
<!-- Paragraph shown below the heading -->
</header>

<main>
<!-- Main content area of the page -->

<form method="POST" action="https://hotel-feedback.freecodecamp.org">
<!-- Form that collects and sends user data -->

<!-- method="POST" sends data in the request body -->

<!-- action="..." specifies where the data is sent -->

<fieldset>
<!-- Groups related form controls -->

<legend>Personal Information</legend>
<!-- Title of the fieldset -->

<label for="full-name">Name (required):</label>
<!-- Text describing the name input -->

<!-- for="full-name" links this label to the input with id="full-name" -->

<input
  type="text"
  id="full-name"
  name="name"
  placeholder="e.g., John Doe"
  required
  size="20">
<!-- Text input field -->

<!-- type="text" = normal text box -->

<!-- id="full-name" = unique identifier -->

<!-- name="name" = key sent to server -->

<!-- placeholder = hint text -->

<!-- required = cannot be empty -->

<!-- size="20" = approximately 20 characters wide -->

<label for="email">Email address (required):</label>
<!-- Label for email field -->

<input
  placeholder="example@email.com"
  required
  id="email"
  type="email"
  name="email"
  size="20"
/>

<!-- type="email" validates email format -->

<!-- name="email" becomes the key sent to server -->

<label for="age">Age (optional):</label>
<!-- Label for age field -->

<input
  type="number"
  name="age"
  id="age"
  min="3"
  max="100"
/>

<!-- type="number" accepts numbers -->

<!-- min="3" prevents values below 3 -->

<!-- max="100" prevents values above 100 -->

</fieldset>

<fieldset>
<!-- Second group -->

<legend>
  Was this your first time at our hotel?
</legend>

<input
  id="yes-option"
  type="radio"
  name="hotel-stay"
  value="yes"
/>

<!-- Radio button -->

<!-- Radio buttons with same name belong together -->

<label for="yes-option">Yes</label>

<input
  id="no-option"
  type="radio"
  name="hotel-stay"
  value="no"
/>

<label for="no-option">No</label>

<!-- User can select only one option -->

</fieldset>

<fieldset>

<legend>
Why did you choose to stay at our hotel?
(Check all that apply)
</legend>

<input
  type="checkbox"
  id="ads"
  name="choice"
  value="ads"
/>

<label for="ads">
Social Media Ads
</label>

<!-- Checkbox allows multiple selections -->

<input
  type="checkbox"
  id="recommendation"
  name="choice"
  value="recommendation"
/>

<label for="recommendation">
Personal Recommendation
</label>

<input
  type="checkbox"
  id="location"
  name="choice"
  value="location"
/>

<label for="location">
Location
</label>

<input
  checked
  type="checkbox"
  id="reputation"
  name="choice"
  value="reputation"
/>

<!-- checked = selected by default -->

<label for="reputation">
Reputation
</label>

<input
  type="checkbox"
  id="price"
  name="choice"
  value="price"
/>

<label for="price">
Price
</label>

</fieldset>

<fieldset>

<legend>Ratings</legend>

<label for="service">
How was the service?
</label>

<select
  name="service"
  id="service">

<!-- Creates a dropdown menu -->

<option value="poor">
Poor
</option>

<option value="satisfactory">
Satisfactory
</option>

<option value="good">
Good
</option>

<option value="very-good">
Very Good
</option>

<option
  selected
  value="excellent">

Excellent

</option>

<!-- selected = default choice -->

</select>

<label for="food">
How was the food?
</label>

<select
  name="food"
  id="food">

<option value="poor">
Poor
</option>

<option value="satisfactory">
Satisfactory
</option>

<option value="good">
Good
</option>

<option value="very-good">
Very Good
</option>

<option
  selected
  value="excellent">

Excellent

</option>

</select>

</fieldset>

<label for="comments">
Other Comments?
</label>

<textarea
  cols="30"
  rows="10"
  name="comments"
  id="comments">
</textarea>

<!-- Multi-line text input -->

<!-- cols = approximate width -->

<!-- rows = visible height -->

<button type="submit">
Submit
</button>

<!-- Sends all form data to the server -->

</form>

</main>

</body>
</html>
