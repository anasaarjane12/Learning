<!DOCTYPE html>

<!--

  this file uses HTML5

<html lang="en">

<!-- 
  tells browser:

<head>

-->

  <!-- 
    tells browser:

  <!-- 
    tells browser:

<body>

-->



  <h1>

  <!-- 
    tells browser:

    this is main webpage title

    Discover beautiful places, exciting tours, and unforgettable adventures around the world.

  <!-- 
    tells browser:

    show introduction paragraph
  -->



  <h2>

    Packages

  </h2>

    smaller section heading

  </p>

  <!-- 
    package description
  -->



  <ul>

  <!-- 
    create unordered list

    <li>

      <a
        href="https://www.freecodecamp.org/learn"

        clickable link

        target="_blank"
        opens new tab
      -->

    </li>



    <li>

      <a
        href="https://www.freecodecamp.org/learn"
        target="_blank"
      >

        Private Tours

      </a>

    </li>



  </ul>

  </h2>

    itinerary section title

        src
        image location

        alt
        image description

    </figcaption>

      image caption
