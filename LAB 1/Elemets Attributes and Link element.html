<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mini Practice Project</title>

  <link rel="stylesheet" href="./styles.css" />

  <!-- 
    rel="stylesheet"
    connects CSS file

    href="./styles.css"
    looks for styles.css
    in current folder
  -->
</head>

<body>

  <h1>My First Website</h1>

  <!-- Main heading -->

  <p>I am learning HTML, CSS, and JavaScript.</p>

  <!-- Paragraph element -->

  <img
    src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg"
    alt="Two kittens sleeping together"
  />

  <!-- 
    src = image location

    alt = alternative text
  -->

  <br><br>

  <a href="https://www.freecodecamp.org" target="_blank">
    Visit freeCodeCamp
  </a>

  <!-- 
    href = destination URL

    target="_blank"
    opens link in new tab
  -->

  <br><br>

  <input type="checkbox" checked />

  <!-- 
    checked
    means checked by default
  -->

  <br><br>

  <button id="changeTextButton">
    Click Me
  </button>

  <!-- Button element -->

  <script src="./script.js"></script>

  <!-- 
    src="./script.js"
    connects JavaScript file
  -->

</body>
</html>
