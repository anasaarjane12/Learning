<element attribute="value"></element>

<!-- 
  attribute="value"

  Attribute = extra information/settings
-->



<a href="https://www.freecodecamp.org/news/" target="_blank">
  Visit freeCodeCamp
</a>

<!-- 
  <a> = anchor element

  href = destination URL

  target="_blank"
  opens link in new tab

  Text between tags is clickable
-->



<img 
  src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg" 
  alt="Two tabby kittens sleeping together on a couch." 
/>

<!-- 
  src = image location

  alt = alternative text

  alt shown if image breaks
-->



<input type="checkbox" checked />

<!-- 
  <input> = input element

  type="checkbox"
  creates checkbox

  checked
  means checked by default

  checked = boolean attribute
-->



<input type="checkbox" />

<!-- 
  Without checked,
  checkbox is unchecked
-->



<input type="text" disabled>

<!-- 
  type="text"
  creates text input

  disabled
  means input cannot be used
-->



<!-- 
  Boolean attributes:

  checked
  disabled
  readonly
  required
-->



<!-- 
  Attributes:
  - provide extra information
  - define behavior
-->
