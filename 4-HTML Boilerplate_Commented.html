<!DOCTYPE html>

<!-- 
  tells browser:
  this file uses HTML5
-->



<html lang="en">

<!-- 
  <html>
  root/main element

  lang="en"
  page language is English

  EXAMPLE:
  de = German
-->



<head>

<!-- 
  <head>
  contains webpage information/settings
-->



  <meta charset="utf-8" />

  <!-- 
    charset="utf-8"

    supports many languages/symbols

    EXAMPLE:
    é ü 😀
  -->



  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- 
    Makes website responsive

    width=device-width
    uses real device width

    initial-scale=1.0
    normal zoom level
  -->



  <title>freeCodeCamp</title>

  <!-- 
    <title>

    text shown in browser tab
  -->



  <link rel="stylesheet" href="./styles.css" />

  <!-- 
    <link>
    connects CSS file

    href="./styles.css"
    looks for styles.css
    in current folder
  -->

</head>



<body>

<!-- 
  <body>
  visible webpage content
-->



  <h1>I am a main title</h1>

  <!-- 
    <h1>
    main heading/title
  -->



  <p>Example paragraph text</p>

  <!-- 
    <p>
    paragraph text
  -->

</body>
</html>
