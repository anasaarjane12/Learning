
<h1>Main heading element</h1>
<!-- 
  Heading element

  <h1> = opening tag
  </h1> = closing tag

  Used for main titles
-->



<p>I am a paragraph element.</p>
<!-- 
  Paragraph element

  <p> = opening tag
  </p> = closing tag

  Used for normal text
-->



<p>
</p>
<!-- 
  Example of opening and closing tags

  / means closing tag
-->



<img>
<!-- 
  Void element

  No closing tag
  No content inside
-->



<img />
<!-- 
  Another valid void element style

  Both forms work:
  <img>
  <img />
-->



<img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/running-cats.jpg" />
<!-- 
  src = image location/source

  Attribute = extra information
-->



<img 
  src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg" 
  alt="Two tabby kittens sleeping together on a couch." 
/>
<!-- 
  alt = alternative text

  Shown if image breaks
-->



<!-- 
  HTML = structure/content
  CSS = styling/design
  JavaScript = interactivity
-->
