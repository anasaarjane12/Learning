<element attribute="value"></element>

<!-- 
  attribute="value"

  Attribute = extra information/settings

  EXAMPLE:
  href="https://www.freecodecamp.org"
-->



<a href="https://www.freecodecamp.org/news/" target="_blank">
  Visit freeCodeCamp
</a>

<!-- 
  <a>
  anchor element/hyperlink

  href
  destination URL

  target="_blank"
  opens link in new tab

  Text between tags is clickable

  EXAMPLE:
  Visit freeCodeCamp
-->



<img 
  src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg" 
  alt="Two tabby kittens sleeping together on a couch." 
/>

<!-- 
  src
  image location

  alt
  alternative text

  alt shown if image breaks

  EXAMPLE:
  alt="Sleeping cat"
-->



<input type="checkbox" checked />

<!-- 
  <input>
  input element

  type="checkbox"
  creates checkbox

  checked
  checked by default

  checked = boolean attribute
-->



<input type="checkbox" />

<!-- 
  Without checked,
  checkbox is unchecked
-->



<input type="text" disabled>

<!-- 
  type="text"
  creates text input

  disabled
  input cannot be used

  disabled = boolean attribute
-->



<!-- 
  Boolean attributes:

  checked
  disabled
  readonly
  required
-->



<!-- 
  Attributes:
  - provide extra information
  - define behavior
-->
